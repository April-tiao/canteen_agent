services:
  canteen-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: canteen-agent:latest
    container_name: canteen-agent
    ports:
      - "8000:8000"
    environment:
      TEXT_THRESHOLD: "0.5"
      VISION_THRESHOLD: "0.5"
      IMAGE_SIZE: "160"
      DECODE_REDUCTION: "2"
      ORT_INTRA_THREADS: "1"
      ORT_INTER_THREADS: "1"
      CV_THREADS: "1"
